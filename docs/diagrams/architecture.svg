<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460" style="font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e293b"/>
    </pattern>
    <!-- Arrow markers -->
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="460" fill="#0f172a"/>
  <rect width="1000" height="460" fill="url(#dots)"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600" letter-spacing="0.5">MacroPad — System Architecture</text>

  <!-- ───────────────── K809 Hardware node (top-center) ───────────────── -->
  <rect x="390" y="54" width="220" height="52" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="500" y="74" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700" letter-spacing="1">HARDWARE</text>
  <text x="500" y="92" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">INSTANT K809</text>
  <text x="500" y="107" text-anchor="middle" fill="#94a3b8" font-size="10">USB-C · VID 0x30FA · PID 0x2350</text>

  <!-- USB HID arrow down to HID Monitor -->
  <line x1="500" y1="106" x2="500" y2="168" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-accent)" stroke-dasharray="4,3"/>
  <text x="512" y="143" fill="#94a3b8" font-size="10">USB HID</text>

  <!-- ───────────────── MacroPad.app container ───────────────── -->
  <rect x="42" y="170" width="680" height="242" rx="10" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="42" y="170" width="680" height="26" rx="10" fill="#0f172a"/>
  <rect x="42" y="185" width="680" height="11" fill="#0f172a"/>
  <text x="382" y="188" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="700" letter-spacing="1.5">MacroPad.app  ·  Tauri v2</text>

  <!-- Divider between Frontend and Backend -->
  <line x1="382" y1="200" x2="382" y2="406" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Tauri IPC label -->
  <text x="382" y="298" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600" letter-spacing="1">IPC</text>
  <line x1="370" y1="290" x2="370" y2="306" stroke="#38bdf8" stroke-width="1"/>
  <line x1="394" y1="290" x2="394" y2="306" stroke="#38bdf8" stroke-width="1"/>
  <line x1="370" y1="298" x2="394" y2="298" stroke="#38bdf8" stroke-width="1"/>

  <!-- Section labels -->
  <text x="212" y="218" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">WKWebView Frontend</text>
  <text x="551" y="218" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">Rust Backend</text>

  <!-- ── Frontend nodes ── -->
  <!-- Tab Router -->
  <rect x="58" y="228" width="148" height="38" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="132" y="243" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Tab Router</text>
  <text x="132" y="257" text-anchor="middle" fill="#64748b" font-size="9">index.html · vanilla JS</text>

  <!-- Configurator -->
  <rect x="58" y="278" width="148" height="38" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="132" y="293" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Configurator</text>
  <text x="132" y="307" text-anchor="middle" fill="#64748b" font-size="9">configurator.html · 20-key UI</text>

  <!-- Key Tester -->
  <rect x="58" y="328" width="148" height="38" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="132" y="343" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Key Tester</text>
  <text x="132" y="357" text-anchor="middle" fill="#64748b" font-size="9">tester.html · HID event UI</text>

  <!-- Tauri Bridge -->
  <rect x="218" y="278" width="148" height="38" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="292" y="293" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">Tauri Bridge</text>
  <text x="292" y="307" text-anchor="middle" fill="#64748b" font-size="9">tauri-bridge.js · invoke()</text>

  <!-- ── Backend nodes ── -->
  <!-- HID Monitor -->
  <rect x="394" y="228" width="148" height="38" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="468" y="243" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">HID Monitor</text>
  <text x="468" y="257" text-anchor="middle" fill="#64748b" font-size="9">hid_monitor.rs · polls 2s</text>

  <!-- Karabiner Manager -->
  <rect x="394" y="278" width="148" height="38" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="468" y="293" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">Karabiner Manager</text>
  <text x="468" y="307" text-anchor="middle" fill="#64748b" font-size="9">karabiner.rs · patch JSON</text>

  <!-- Profile Store -->
  <rect x="554" y="228" width="148" height="38" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="628" y="243" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">Profile Store</text>
  <text x="628" y="257" text-anchor="middle" fill="#64748b" font-size="9">profile_store.rs · AppSupport</text>

  <!-- System Tray -->
  <rect x="554" y="278" width="148" height="38" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="628" y="293" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">System Tray</text>
  <text x="628" y="307" text-anchor="middle" fill="#64748b" font-size="9">tray.rs · menu bar icon</text>

  <!-- IPC commands label below divider -->
  <text x="212" y="390" text-anchor="middle" fill="#475569" font-size="9">localStorage · install_profile · export_json</text>
  <text x="551" y="390" text-anchor="middle" fill="#475569" font-size="9">get_device_status · save_profile · get_karabiner_status</text>

  <!-- ───────────────── External nodes (right column) ───────────────── -->

  <!-- Karabiner-Elements -->
  <rect x="758" y="228" width="198" height="52" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="857" y="248" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700" letter-spacing="1">APP</text>
  <text x="857" y="264" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">Karabiner-Elements</text>
  <text x="857" y="278" text-anchor="middle" fill="#94a3b8" font-size="10">complex_modifications engine</text>

  <!-- ~/.config/karabiner -->
  <rect x="758" y="300" width="198" height="46" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="857" y="318" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">~/.config/karabiner/</text>
  <text x="857" y="334" text-anchor="middle" fill="#64748b" font-size="10">karabiner.json · backups/</text>

  <!-- ~/Library/Application Support -->
  <rect x="758" y="364" width="198" height="46" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="857" y="382" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">~/Library/Application Support/</text>
  <text x="857" y="398" text-anchor="middle" fill="#64748b" font-size="10">com.macropad.app/ · profile.json</text>

  <!-- ───────────────── Arrows ───────────────── -->

  <!-- HID Monitor → System Tray (device_status event) -->
  <path d="M 468 266 Q 468 320 554 320 Q 600 320 554 316" fill="none" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrow-accent)" stroke-dasharray="3,2"/>

  <!-- Karabiner Manager → ~/.config/karabiner -->
  <line x1="542" y1="297" x2="756" y2="323" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow-muted)"/>
  <text x="640" y="312" text-anchor="middle" fill="#64748b" font-size="9" transform="rotate(-4, 640, 312)">read / write</text>

  <!-- Profile Store → ~/Library/Application Support -->
  <line x1="704" y1="260" x2="756" y2="380" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow-muted)"/>

  <!-- Karabiner Manager → Karabiner-Elements (reload) -->
  <line x1="542" y1="285" x2="756" y2="258" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrow-muted)"/>
  <text x="658" y="268" text-anchor="middle" fill="#f59e0b" font-size="9" transform="rotate(-8, 658, 268)">karabiner_cli --reload</text>

  <!-- Configurator → Tauri Bridge -->
  <line x1="206" y1="297" x2="218" y2="297" stroke="#818cf8" stroke-width="1" marker-end="url(#arrow-link)"/>

  <!-- Tauri Bridge → right (IPC) -->
  <line x1="366" y1="297" x2="382" y2="297" stroke="#818cf8" stroke-width="1" marker-end="url(#arrow-link)"/>
  <line x1="382" y1="297" x2="394" y2="297" stroke="#38bdf8" stroke-width="1" marker-end="url(#arrow-accent)"/>

  <!-- ───────────────── Legend ───────────────── -->
  <rect x="42" y="420" width="680" height="32" rx="5" fill="#0f172a"/>
  <line x1="60" y1="436" x2="80" y2="436" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="84" y="440" fill="#94a3b8" font-size="9">Rust Backend</text>
  <line x1="160" y1="436" x2="180" y2="436" stroke="#818cf8" stroke-width="1.5"/>
  <text x="184" y="440" fill="#94a3b8" font-size="9">JS Frontend</text>
  <line x1="250" y1="436" x2="270" y2="436" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-accent)"/>
  <text x="274" y="440" fill="#94a3b8" font-size="9">USB HID / events</text>
  <line x1="380" y1="436" x2="400" y2="436" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="404" y="440" fill="#94a3b8" font-size="9">Karabiner reload</text>
  <line x1="490" y1="436" x2="510" y2="436" stroke="#475569" stroke-width="1.5"/>
  <text x="514" y="440" fill="#94a3b8" font-size="9">File I/O</text>
</svg>
